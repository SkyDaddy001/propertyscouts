name: Rebuild on Price Update (n8n Webhook)

on:
  repository_dispatch:
    types: [prices-updated]

jobs:
  rebuild:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.128.0'
          extended: true

      - name: Build
        run: hugo --minify

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: public
          branch: gh-pages
          cname: propertyscouts.in

      - name: Notify completion
        run: |
          echo "✅ Website rebuilt and deployed at $(date)"
          echo "Triggered by: Price update from n8n"
