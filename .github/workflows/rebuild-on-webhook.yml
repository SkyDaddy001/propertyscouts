name: Rebuild on Price Update (n8n Webhook)

on:
  repository_dispatch:
    types: [prices-updated]

jobs:
  rebuild:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build
        run: hugo --minify

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v3

      - name: Notify completion
        run: |
          echo "✅ Website rebuilt and deployed at $(date)"
          echo "Triggered by: Price update from n8n"
