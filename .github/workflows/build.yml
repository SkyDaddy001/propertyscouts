name: Build and Deploy Hugo

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.128.0'
          extended: true

      - name: Debug - Print Env Vars
        env:
          HUGO_PARAMS_GEMINIAPIKEY: ${{ secrets.GEMINI_API_KEY }}
          HUGO_PARAMS_FORMWEBHOOKURL: ${{ secrets.FORM_WEBHOOK_URL }}
          HUGO_PARAMS_GOOGLEANALYTICSID: ${{ secrets.GA_TRACKING_ID }}
        run: |
          echo "FORM_WEBHOOK_URL secret value length: ${#HUGO_PARAMS_FORMWEBHOOKURL}"
          echo "FORM_WEBHOOK_URL secret value: $HUGO_PARAMS_FORMWEBHOOKURL"

      - name: Build
        env:
          HUGO_PARAMS_GEMINIAPIKEY: ${{ secrets.GEMINI_API_KEY }}
          HUGO_PARAMS_FORMWEBHOOKURL: ${{ secrets.FORM_WEBHOOK_URL }}
          HUGO_PARAMS_GOOGLEANALYTICSID: ${{ secrets.GA_TRACKING_ID }}
        run: |
          hugo --minify
          echo "Checking built HTML for webhook URL..."
          grep -o 'formWebhookUrl: "[^"]*"' public/index.html | head -1

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/master'
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git fetch origin gh-pages --depth=1 || echo "gh-pages branch does not exist yet"
          git symbolic-ref refs/remotes/origin/HEAD origin/master
          git checkout --orphan gh-pages
          git rm -rf .
          cp -r public/* .
          cp public/.nojekyll . 2>/dev/null || true
          git add .
          git commit -m "Deploy from master: ${{ github.sha }}" || echo "No changes to commit"
          git push -f origin gh-pages
