name: Build and Deploy Hugo

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.128.0'
          extended: true

      - name: Build
        env:
          HUGO_PARAMS_GEMINIAPIKEY: ${{ secrets.GEMINI_API_KEY }}
          HUGO_PARAMS_FORMWEBHOOKURL: ${{ secrets.FORM_WEBHOOK_URL }}
          HUGO_PARAMS_GOOGLEANALYTICSID: ${{ secrets.GA_TRACKING_ID }}
        run: hugo --minify

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/master'
        run: |
          cd public
          git init
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add .
          git commit -m "Deploy from master: ${{ github.sha }}"
          git push -f https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:gh-pages
